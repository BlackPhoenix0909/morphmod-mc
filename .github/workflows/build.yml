name: Build MorphMod JAR

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Java 17 installieren
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 8.6 installieren
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Mod bauen
        run: gradle build --no-daemon

      - name: JAR als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: morphmod-jar
          path: build/libs/morphmod-*.jar
          if-no-files-found: error

      - name: Bei Release automatisch veröffentlichen
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: build/libs/morphmod-*.jar
