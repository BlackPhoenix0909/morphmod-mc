name: Build MorphMod JAR

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Java 21 installieren
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradle Wrapper ausführbar machen
        run: chmod +x gradlew

      - name: Mod bauen
        run: ./gradlew build --no-daemon

      - name: JAR als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: morphmod-jar
          path: build/libs/morphmod-*.jar
          if-no-files-found: error

      - name: Bei Release automatisch veröffentlichen
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: build/libs/morphmod-*.jar
