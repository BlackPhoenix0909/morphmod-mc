name: Build MorphMod JAR

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Java 21 installieren
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 8.6 installieren
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Mod bauen
        run: gradle build --no-daemon

      - name: JAR als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: morphmod-jar
          path: build/libs/morphmod-*.jar
          if-no-files-found: error
